<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Releases Ad-Bot</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 720px;
      margin: 80px auto;
      padding: 40px 20px;
      text-align: center;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      background: #e6f4ea;
      color: #137333;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    p {
      color: #555;
      margin-bottom: 30px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      background: #2563eb;
      color: white;
      transition: all 0.2s ease;
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
    }

    .button:hover {
      background: #1e4ed8;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
    }

    .button:active {
      transform: scale(0.98);
    }

    .footer {
      margin-top: 30px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🤖 Ad-Bot 🤖</h1>

    <div class="badge">
      Última versão
      <label id="version">...</label>
    </div>

    <p>
      Faça download da automação inteligente de anúncios online.
    </p>

    <a class="button" href="https://github.com/nobregao/ad-bot-downloads/releases/latest/download/bot.zip"
      onclick="handleDownload()">
      ⬇️ Download
    </a>

    <div class="footer">
      Em caso de dúvidas, entre em contato com o suporte.
    </div>
  </div>

  <script>
    function handleDownload() {
      const btn = document.querySelector('.button');
      btn.innerHTML = "⏳ Baixando...";

      setTimeout(() => {
        btn.innerHTML = "⬇️ Download";
      }, 3000);
    }

    async function loadLatestVersion() {
      try {
        const res = await fetch(
          "https://api.github.com/repos/nobregao/ad-bot-downloads/releases/latest"
        );

        const data = await res.json();

        const version = data.tag_name;

        document.getElementById("version").innerHTML = version;

      } catch (error) {
        document.getElementById("version").innerHTML =
          "Não foi possível carregar a versão";
      }
    }

    loadLatestVersion();
  </script>
  </script>
</body>

</html>
