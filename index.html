<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Releases Ad-Bot</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">

  <style>
    body {
      background: #f5f7fa;
    }

    .page-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .download-card {
      border-radius: 18px !important;
    }

    .hero-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .version-wrapper {
      margin: 20px 0 28px;
    }

    .download-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .download-button {
      min-width: 220px;
    }

    .support-text {
      margin-top: 28px;
      color: rgba(0, 0, 0, 0.55);
    }
  </style>
</head>

<body>
  <main class="page-wrapper">
    <section class="ui raised padded text container segment download-card">
      <div class="ui center aligned basic segment">
        <div class="hero-icon">🤖</div>

        <h1 class="ui header">
          Ad-Bot
          <div class="sub header">
            Faça download da automação inteligente de anúncios online.
          </div>
        </h1>

        <div class="version-wrapper">
          <div>
            Última versão:
            <span id="version" class="ui green label">Carregando...</span>
          </div>
        </div>

        <p class="support-text">
          Escolha a versão compatível com seu sistema operacional.
        </p>

        <div class="download-group">

          <a id="downloadWin" class="ui large blue labeled icon button download-button"
            href="https://github.com/nobregao/ad-bot-downloads/releases/latest/download/ad-bot-windows.zip"
            onclick="handleDownload(this)">
            <i class="windows icon"></i>
            Windows
          </a>

          <a id="downloadMac" class="ui large black labeled icon button download-button"
            href="https://github.com/nobregao/ad-bot-downloads/releases/latest/download/ad-bot-macos.zip"
            onclick="handleDownload(this)">
            <i class="apple icon"></i>
            Mac
          </a>

        </div>
      </div>
    </section>
  </main>

  <script>
    function handleDownload(button) {
      button.classList.add('loading', 'disabled');
      const originalText = button.innerHTML;

      button.innerHTML = '<i class="download icon"></i>Baixando...';

      setTimeout(() => {
        button.classList.remove('loading', 'disabled');
        button.innerHTML = originalText;
      }, 3000);
    }

    async function loadLatestVersion() {
      const versionElement = document.getElementById("version");

      try {
        const res = await fetch(
          "https://api.github.com/repos/nobregao/ad-bot-downloads/releases/latest"
        );

        if (!res.ok) {
          throw new Error("Falha ao buscar release");
        }

        const data = await res.json();
        versionElement.textContent = data.tag_name || "Indisponível";
      } catch (error) {
        versionElement.textContent = "Não disponível";
      }
    }

    loadLatestVersion();
  </script>
</body>

</html>
