<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Releases Ad-Bot</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.5.0/dist/semantic.min.css">

  <style>
    body {
      background: #f5f7fa;
    }

    .page-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .download-card {
      border-radius: 18px !important;
    }

    .hero-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .version-wrapper {
      margin: 20px 0 28px;
    }

    .download-button {
      min-width: 220px;
    }

    .support-text {
      margin-top: 28px;
      color: rgba(0, 0, 0, 0.55);
    }
  </style>
</head>

<body>
  <main class="page-wrapper">
    <section class="ui raised padded text container segment download-card">
      <div class="ui center aligned basic segment">
        <div class="hero-icon">🤖</div>

        <h1 class="ui header">
          Ad-Bot
          <div class="sub header">
            Faça download da automação inteligente de anúncios online.
          </div>
        </h1>

        <div class="version-wrapper">
          <div>
            Última versão:
            <span id="version" class="ui green label">Carregando...</span>
          </div>
        </div>

        <a id="downloadBtn" class="ui large blue labeled icon button download-button"
          href="https://github.com/nobregao/ad-bot-downloads/releases/latest/download/ad-bot.zip"
          onclick="handleDownload()">
          <i class="download icon"></i>
          Download
        </a>

        <!-- <div style="margin-top: 14px;">
          <a class="ui basic button" href="https://github.com/nobregao/ad-bot-downloads/releases/latest" target="_blank"
            rel="noopener noreferrer">
            Ver detalhes da release
          </a>
        </div> -->

        <p class="support-text">
          Em caso de dúvidas, entre em contato com o suporte.
        </p>
      </div>
    </section>
  </main>

  <script>
    function handleDownload() {
      const btn = document.getElementById('downloadBtn');

      btn.classList.add('loading');
      btn.classList.add('disabled');
      btn.innerHTML = '<i class="download icon"></i>Baixando...';

      setTimeout(() => {
        btn.classList.remove('loading');
        btn.classList.remove('disabled');
        btn.innerHTML = '<i class="download icon"></i>Download';
      }, 3000);
    }

    async function loadLatestVersion() {
      const versionElement = document.getElementById("version");

      try {
        const res = await fetch(
          "https://api.github.com/repos/nobregao/ad-bot-downloads/releases/latest"
        );

        if (!res.ok) {
          throw new Error("Falha ao buscar release");
        }

        const data = await res.json();
        versionElement.textContent = data.tag_name || "Indisponível";
      } catch (error) {
        versionElement.textContent = "Não disponível";
      }
    }

    loadLatestVersion();
  </script>
</body>

</html>
